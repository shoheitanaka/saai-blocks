name: Release

on:
    push:
        tags:
            - 'v*.*.*'

jobs:
    release:
        name: Build & Release
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '22.x'

            - name: Install dependencies & build
              run: |
                  npm install
                  npm run build

            - name: Get version from tag
              id: version
              run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

            - name: Create plugin zip
              run: |
                  PLUGIN_SLUG="saai-blocks"
                  VERSION="${{ steps.version.outputs.VERSION }}"

                  mkdir -p "/tmp/${PLUGIN_SLUG}-${VERSION}/${PLUGIN_SLUG}"
                  rsync -a \
                    --exclude-from='.distignore' \
                    . "/tmp/${PLUGIN_SLUG}-${VERSION}/${PLUGIN_SLUG}/"

                  cd "/tmp/${PLUGIN_SLUG}-${VERSION}"
                  zip -r "${PLUGIN_SLUG}-${VERSION}.zip" "${PLUGIN_SLUG}/"
                  mv "${PLUGIN_SLUG}-${VERSION}.zip" "$GITHUB_WORKSPACE/"

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  name: ${{ github.ref_name }}
                  tag_name: ${{ github.ref_name }}
                  generate_release_notes: true
                  files: saai-blocks-${{ steps.version.outputs.VERSION }}.zip

            # ================================================================
            # Deploy to WordPress.org SVN
            # Required secrets:
            #   WPORG_USERNAME — WordPress.org account username
            #   WPORG_PASSWORD — WordPress.org application password
            #     (generate at: https://profiles.wordpress.org/me/profile/applications/)
            # ================================================================
            - name: Deploy to WordPress.org
              uses: 10up/action-wordpress-org-deploy@v2
              with:
                  SLUG: saai-blocks
                  VERSION: ${{ steps.version.outputs.VERSION }}
                  WPORG_USERNAME: ${{ secrets.WPORG_USERNAME }}
                  WPORG_PASSWORD: ${{ secrets.WPORG_PASSWORD }}
                  ASSETS_DIR: .wordpress-org
